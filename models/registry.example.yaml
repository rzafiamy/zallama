# Zallama model registry — TEMPLATE.
#
# The LIVE registry lives beside your models at <models_dir>/registry.yaml
# (default ~/.zallama/models/registry.yaml) and is normally managed for you by
# `zallama pull` / `zallama add`. Edit it by hand only for advanced tweaks.
#
# Each entry:
#   name:        unique id, also the OpenAI "model" name and registry key
#   file:        primary gguf (absolute, or relative to models_dir)
#   modality:    text | asr | tts | image          (optional, default: text)
#   backend:     which engine runs it               (optional, default: llama-server)
#   artifacts:   extra files (mmproj for vision, …) (optional)
#   params:      per-model overrides of llama_server.default_params (optional)
#   aliases:     alternate names that resolve to this entry (optional)
#   mem_gb:      declared memory cost for the LRU budget (optional)

models:
  # --- Plain text / chat model ------------------------------------------------
  - name: llama3.2-3b
    file: Llama-3.2-3B-Instruct-Q4_K_M.gguf
    description: "Llama 3.2 3B Instruct (Q4_K_M)"
    params:
      ctx_size: 8192
      n_gpu_layers: 99

  # --- Vision model: same backend, plus an mmproj projector -------------------
  # The projector is downloaded automatically by `zallama pull` for VL repos.
  # Local projector files are namespaced by model name to avoid collisions when
  # two repos ship a generically-named "mmproj-F16.gguf".
  - name: qwen2.5-vl-7b
    file: Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf
    description: "Qwen2.5-VL 7B (vision)"
    artifacts:
      mmproj: qwen2.5-vl-7b.mmproj-F16.gguf
    params:
      ctx_size: 8192
      n_gpu_layers: 99
