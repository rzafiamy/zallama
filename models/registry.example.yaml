# Zallama model registry — TEMPLATE.
#
# The LIVE registry lives beside your models at <models_dir>/registry.yaml
# (default ~/.zallama/models/registry.yaml) and is normally managed for you by
# `zallama pull` / `zallama add`. Edit it by hand only for advanced tweaks.
#
# Each entry:
#   name:        unique id, also the OpenAI "model" name and registry key
#   file:        primary gguf (absolute, or relative to models_dir)
#   modality:    text | embedding | rerank | asr | tts | image  (default: text)
#   backend:     which engine runs it               (optional, default: llama-server)
#   artifacts:   extra files (mmproj for vision, …) (optional)
#   params:      per-model overrides of llama_server.default_params (optional)
#   aliases:     alternate names that resolve to this entry (optional)
#   mem_gb:      declared memory cost for the LRU budget (optional)

models:
  # --- Plain text / chat model ------------------------------------------------
  - name: llama3.2-3b
    file: Llama-3.2-3B-Instruct-Q4_K_M.gguf
    description: "Llama 3.2 3B Instruct (Q4_K_M)"
    params:
      ctx_size: 8192
      n_gpu_layers: 99

  # --- Vision model: same backend, plus an mmproj projector -------------------
  # The projector is downloaded automatically by `zallama pull` for VL repos.
  # Local projector files are namespaced by model name to avoid collisions when
  # two repos ship a generically-named "mmproj-F16.gguf".
  - name: qwen2.5-vl-7b
    file: Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf
    description: "Qwen2.5-VL 7B (vision)"
    artifacts:
      mmproj: qwen2.5-vl-7b.mmproj-F16.gguf
    params:
      ctx_size: 8192
      n_gpu_layers: 99

  # --- ASR / speech-to-text: parakeet.cpp -------------------------------------
  # Served by parakeet-server (build with build-ggml-parakeet.cpp.sh, which
  # installs the binary into ./bin/). Exposed at POST /v1/audio/transcriptions,
  # OpenAI-compatible, multipart upload, WAV input.
  # Easiest path: `zallama pull parakeet:0.6b` downloads the gguf and writes this
  # entry for you. The file below matches mudler/parakeet-cpp-gguf.
  - name: parakeet:0.6b
    file: tdt-0.6b-v2-q8_0.gguf
    modality: asr
    backend: parakeet-server
    description: "NVIDIA Parakeet TDT 0.6B v2 (speech-to-text)"
    params:
      threads: 4

  # --- RAG: embedding model ---------------------------------------------------
  # Runs llama-server in --embedding mode via the embedding-server backend and
  # serves POST /v1/embeddings. zvec uses this to embed & search documents; set
  # it as rag.embedding_model in config.yaml. `zallama pull nomic-embed:v1.5`
  # downloads it and writes this entry for you.
  # (Legacy entries that instead set `params: {embedding: true}` on a text model
  # still work — they are treated as the embedding modality at runtime.)
  - name: nomic-embed:v1.5
    file: nomic-embed-text-v1.5.Q4_K_M.gguf
    modality: embedding
    backend: embedding-server
    description: "Nomic Embed Text v1.5 (embeddings)"
    params:
      ctx_size: 4096
      n_gpu_layers: 99

  # --- RAG: reranker (cross-encoder) ------------------------------------------
  # Runs llama-server in --reranking mode via the rerank-server backend and is
  # exposed at POST /v1/rerank. zvec can use it to rerank query candidates; set
  # it as rag.rerank_model in config.yaml. `zallama pull bge-reranker:v2-m3`
  # downloads it and writes this entry for you.
  - name: bge-reranker:v2-m3
    file: bge-reranker-v2-m3-Q4_K_M.gguf
    modality: rerank
    backend: rerank-server
    description: "BGE Reranker v2-m3 (rerank, multilingual)"
    params:
      ctx_size: 4096
      n_gpu_layers: 99
